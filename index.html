<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8 - JavaScript Effects</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <button class="hamburger" id="hamburger">☰</button>
        <ul class="nav-menu" id="nav-menu">
            <li><span>🏠</span> Головна</li>
            <li><span>ℹ️</span> Про нас</li>
            <li><span>🛠️</span> Послуги</li>
            <li><span>📞</span> Контакти</li>
        </ul>
    </nav>

    <div class="carousel-container">
        <div class="carousel-slide" id="carousel-slide">
            <img src="ass/Windows1.jpg" alt="Slide 1">
            <img src="ass/windows2.jpg" alt="Slide 2">
            <img src="ass/windows3.jpg" alt="Slide 3">
        </div>
        <button class="prev" onclick="moveSlide(-1)">❮</button>
        <button class="next" onclick="moveSlide(1)">❯</button>
        <div class="indicators" id="indicators"></div>
    </div>

    <section class="content">
        <div class="large-only">
            <h3>Тільки для Large (>=768px)</h3>
            <img src="ass/Windows4.jpg" alt="L1">
            <img src="ass/Windows5.jpg" alt="L2">
        </div>
        <div class="medium-only">
            <h3>Тільки для Medium (<768px)</h3>
            <img src="ass/Windows6.jpg" alt="M1">
            <img src="ass/Windows7.jpg" alt="M2">
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
